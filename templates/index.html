<!DOCTYPE html>
<html>
<head>
    <title>Risk Manager CSV Tool</title>
</head>
<body>
    <h2>Upload Files</h2>
    <form action="/process" method="post" enctype="multipart/form-data">
        <p>Upload Verisky CSV Template:</p>
        <input type="file" name="verisky" required><br><br>

        <p>Upload Date Doc (CSV Export):</p>
        <input type="file" name="date_doc" required><br><br>

        <button type="submit">Generate Filled CSV</button>
    </form>
</body>
</html>
